# Render.com 免費部署配置
# 文檔: https://render.com/docs/render-yaml-spec

services:
  # Backend API (Express + SQLite)
  - type: web
    name: finance-drive-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        # Set this to your actual frontend URL after deployment
        value: https://finance-drive.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///opt/render/project/src/data/finance.sqlite
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    healthCheckPath: /api/health
